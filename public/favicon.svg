<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 100 100" width="100" height="100" role="img" aria-label="Proto-Familiar">
  <!-- Brain hemispheres: bold outline, magenta left / deep purple right.
       The central vertical seam runs at x=50; both paths meet there so
       the outline doesn't double up across the fissure. -->
  <g stroke="#000" stroke-width="5" stroke-linejoin="round" stroke-linecap="round">
    <path d="M 50 8
             C 30 6, 12 16, 10 36
             C 8 52, 20 78, 36 86
             C 42 88, 48 88, 50 88 Z"
          fill="#DC1FB6"/>
    <path d="M 50 8
             C 70 6, 88 16, 90 36
             C 92 52, 80 78, 64 86
             C 58 88, 52 88, 50 88 Z"
          fill="#3D1F9E"/>
  </g>

  <!-- Small purple curl on the left hemisphere — the asymmetric tell
       in the original. -->
  <path d="M 22 18
           C 28 22, 32 28, 30 32
           C 26 30, 22 26, 22 18 Z"
        fill="#3D1F9E"/>

  <!-- Three horizontal bars crossing the brain, each with terminal
       dots near the outer edges. Reads as electrode pins under
       favicon-scale rendering and stays legible down to 16×16. -->
  <g fill="#000">
    <rect x="18" y="38" width="64" height="4.5" rx="2.25"/>
    <circle cx="20" cy="40.25" r="4.5"/>
    <circle cx="80" cy="40.25" r="4.5"/>

    <rect x="16" y="52" width="68" height="4.5" rx="2.25"/>
    <circle cx="18" cy="54.25" r="4.5"/>
    <circle cx="82" cy="54.25" r="4.5"/>

    <rect x="22" y="66" width="56" height="4.5" rx="2.25"/>
    <circle cx="24" cy="68.25" r="4.5"/>
    <circle cx="76" cy="68.25" r="4.5"/>
  </g>
</svg>
