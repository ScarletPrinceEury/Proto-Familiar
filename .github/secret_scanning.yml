# Secret-scanning configuration.
#
# Exclude vendored third-party apps from secret scanning. Code under vendor/
# is NOT ours — it's upstream source we vendor verbatim (see vendor/README.md).
# It contains hardcoded public constants that pattern-match as secrets but are
# not credentials of ours. The known case:
#
#   vendor/searxng/searx/engines/youtube_noapi.py — hardcodes YouTube's public
#   "innertube" web-client API key (AIza… format). It's a constant baked into
#   YouTube's own site, identical for everyone, used by yt-dlp / SearXNG / etc.
#   to query YouTube's internal API anonymously. Not a credential we own.
#
# Scanning vendored code yields false positives that can bury a real alert in
# our own code. We still scan everything OUTSIDE vendor/.
paths-ignore:
  - "vendor/**"
